<!--
  Sveltia CMS — Decap CMS의 현대적 드롭인 대체. admin/config.yml을 그대로
  읽음. backend.name: github + Netlify의 자동 OAuth 프록시(api.netlify.com)
  를 통해 GitHub 계정으로 직접 로그인. Netlify Identity widget은 git-gateway
  backend 전용이므로 github backend에서는 제거 (인증 충돌 원인).

  로그인 흐름: /admin/ 접속 → "Login with GitHub" → GitHub OAuth 동의 →
  Sveltia가 GitHub REST API로 main 브랜치에 직접 커밋. 30초 안에 Netlify
  자동 재배포.

  Decap으로 되돌리려면 아래 script를 다음으로 교체:
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
-->
<script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>

</body>
