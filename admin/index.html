<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KIMES Design System — Content editor</title>

<!--
  Netlify Identity widget — handles invite-only sign-in. Pair with
  "git-gateway" backend in config.yml. Without this, Decap can't authenticate
  editors against the GitHub repo.
-->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

<!--
  Sveltia CMS — a modern, drop-in replacement for Decap CMS. Reads the same
  admin/config.yml so collections, fields, widgets, and backends carry over
  unchanged. UX is significantly more polished (dark mode, fast search, real
  media library, keyboard shortcuts).

  To switch back to Decap, replace this script with:
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
-->
<script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>

<script>
  // After signing out, kick the user back to the public site root.
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on('init', user => {
      if (!user) {
        window.netlifyIdentity.on('login', () => {
          document.location.href = '/admin/';
        });
      }
    });
  }
</script>

</body>
</html>
