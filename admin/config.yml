# Sveltia CMS configuration
# ---------------------------------------------------------------------------
# Backend: github. Editors authenticate with their GitHub account; Sveltia
# commits each save directly to this repo's `main` branch via the GitHub
# REST API. For local development, `local_backend: true` below routes saves
# through `npx decap-server` instead (no GitHub needed).
#
# Each section below has two JSON files (one per locale: .en.json / .ko.json)
# and one collection entry that ties the locales together via i18n.
# See content/_loader.js for the details of how content is fetched at runtime.

backend:
  # Sveltia CMS supports github / gitlab / gitea / bitbucket / test-repo /
  # local. Git Gateway is NOT supported (Sveltia dropped it). For production,
  # update `repo` below to <your-github-owner>/<your-repo> and Sveltia will
  # use GitHub OAuth directly — no Netlify Identity needed.
  name: github
  repo: kimes/design-system   # TODO: replace with the real GitHub owner/repo before deploying
  branch: main

# i18n — every collection below is bilingual EN/KO. Sveltia stores each
# locale in a separate file using the `<base>.<locale>.<ext>` convention:
#   content/intro.json  →  content/intro.en.json  +  content/intro.ko.json
i18n:
  structure: multiple_files
  locales: [en, ko]
  default_locale: en

# Where Decap uploads images. The CMS will rewrite <img src=...> URLs to
# point at /assets/uploads/<filename>. Components reading these paths render
# them directly.
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Local-development mode. Run `npx decap-server` in this folder; Decap then
# talks to the local proxy instead of git-gateway, so you can edit content
# without setting up Netlify.
local_backend: true

site_url: "/"
display_url: "/"
logo_url: "/index.html"

collections:
  # =========================================================================
  # Foundations — Brand foundations page (index.html)
  # =========================================================================

  - name: "foundations"
    label: "Brand foundations"
    description: "Each entry below is one section on the public site. Edits commit on save and trigger a rebuild."
    files:

      # ---------- 01 Intro / Hero ----------
      - file: "content/intro.json"
        name: "intro"
        label: "01 — Intro / Hero"
        format: "json"
        i18n: true
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "meta"
            label: "Meta facts"
            label_singular: "Fact"
            widget: "list"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "value", label: "Value", widget: "string" }

      # ---------- 02 Brand family ----------
      - file: "content/family.json"
        name: "family"
        label: "02 — Brand family"
        format: "json"
        i18n: true
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "brands"
            label: "Brands"
            label_singular: "Brand"
            widget: "list"
            fields:
              - { name: "id",            label: "ID",                  widget: "string" }
              - { name: "name",          label: "Name",                widget: "string" }
              - { name: "desc",          label: "Description",         widget: "text" }
              - { name: "primary",       label: "Primary color (hex)", widget: "color" }
              - { name: "secondary",     label: "Secondary color (hex)", widget: "color" }
              - { name: "signature",     label: "Slash-cut family",    widget: "boolean", required: false }
              - { name: "bgClass",       label: "Preview bg class",    widget: "string", default: "bg-white" }
              - name: "wordmark"
                label: "Wordmark"
                widget: "select"
                options:
                  - { label: "KIMES",                 value: "kimes" }
                  - { label: "MedicomteK",            value: "medicomtek" }
                  - { label: "Beauty&Derma — stack",  value: "beautyderma-stack" }
                  - { label: "INSPIRE — tagline lime", value: "inspire-tagline-lime" }
              - { name: "wordmarkSize", label: "Wordmark height (px)", widget: "number", default: 64 }
          - name: "badges"
            label: "Badge labels"
            widget: "object"
            fields:
              - { name: "signature",   label: "Slash-cut family badge", widget: "string" }
              - { name: "independent", label: "Independent badge",      widget: "string" }

      # ---------- 03 Color tokens ----------
      - file: "content/color.json"
        name: "color"
        label: "03 — Color tokens"
        format: "json"
        i18n: true
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "groups"
            label: "Brand color groups"
            label_singular: "Group"
            widget: "list"
            fields:
              - { name: "id",        label: "ID",                  widget: "string" }
              - { name: "name",      label: "Brand name",          widget: "string" }
              - { name: "indicator", label: "Indicator dot color", widget: "color" }
              - { name: "note",      label: "Sub-text",            widget: "string" }
              - name: "rows"
                label: "Color rows"
                label_singular: "Color"
                widget: "list"
                fields:
                  - { name: "token", label: "Token (CSS var)", widget: "string" }
                  - { name: "hex",   label: "HEX",             widget: "color" }
                  - { name: "rgb",   label: "RGB",             widget: "string" }
                  - { name: "cmyk",  label: "CMYK",            widget: "string" }
                  - { name: "usage", label: "Usage notes",     widget: "text" }
          - name: "tableHeaders"
            label: "Table column labels"
            widget: "object"
            fields:
              - { name: "token", label: "Token col",  widget: "string", default: "Token" }
              - { name: "hex",   label: "HEX col",    widget: "string", default: "HEX" }
              - { name: "rgb",   label: "RGB col",    widget: "string", default: "RGB" }
              - { name: "cmyk",  label: "CMYK col",   widget: "string", default: "CMYK" }
              - { name: "usage", label: "Usage col",  widget: "string", default: "Usage" }

      # ---------- 06 Typography ----------
      - file: "content/typography.json"
        name: "typography"
        label: "06 — Typography"
        format: "json"
        i18n: true
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "tabs"
            label: "Tab labels"
            widget: "object"
            fields:
              - { name: "latin", label: "Latin tab", widget: "string" }
              - { name: "kr",    label: "Korean tab", widget: "string" }
          - name: "scaleLatin"
            label: "Latin (Montserrat) scale"
            label_singular: "Step"
            widget: "list"
            fields:
              - { name: "token",  label: "Token",        widget: "string" }
              - { name: "size",   label: "Size (px)",    widget: "number" }
              - { name: "weight", label: "Weight",       widget: "number" }
              - { name: "lh",     label: "Line height",  widget: "number", value_type: "float" }
              - { name: "label",  label: "Label",        widget: "string" }
              - { name: "sample", label: "Sample text",  widget: "text" }
          - name: "scaleKr"
            label: "Korean (Pretendard) scale"
            label_singular: "Step"
            widget: "list"
            fields:
              - { name: "token",  label: "Token",        widget: "string" }
              - { name: "size",   label: "Size (px)",    widget: "number" }
              - { name: "weight", label: "Weight",       widget: "number" }
              - { name: "lh",     label: "Line height",  widget: "number", value_type: "float" }
              - { name: "label",  label: "Label",        widget: "string" }
              - { name: "sample", label: "Sample text",  widget: "text" }

      # ---------- 08 Logo catalog ----------
      - file: "content/logo.json"
        name: "logo"
        label: "08 — Logo catalog"
        format: "json"
        i18n: true
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "brands"
            label: "Brands"
            label_singular: "Brand"
            widget: "list"
            fields:
              - { name: "id",    label: "ID",                widget: "string" }
              - { name: "name",  label: "Brand name",        widget: "string" }
              - { name: "color", label: "Indicator color",   widget: "color" }
              - name: "items"
                label: "Logo files"
                label_singular: "File"
                widget: "list"
                fields:
                  - { name: "svg",   label: "SVG ref (LogoSvgs.js key)", widget: "string" }
                  - { name: "file",  label: "Filename",                  widget: "string" }
                  - { name: "label", label: "Label",                     widget: "string" }
                  - { name: "h",     label: "Display height (px)",       widget: "number" }
                  - { name: "dark",  label: "Dark tile",                 widget: "boolean", required: false, default: false }
          - name: "familySignature"
            label: "Family signature footer"
            widget: "object"
            fields:
              - { name: "title", label: "Title",              widget: "string" }
              - { name: "body",  label: "Body (HTML allowed)", widget: "text" }

      # ---------- 12 Spacing & grid ----------
      - file: "content/spacing.json"
        name: "spacing"
        label: "12 — Spacing & grid"
        format: "json"
        i18n: true
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "scale"
            label: "Spacing scale"
            widget: "object"
            fields:
              - { name: "title", label: "Sub-title",   widget: "string" }
              - { name: "desc",  label: "Description (HTML allowed)", widget: "text" }
              - name: "tokens"
                label: "Tokens"
                label_singular: "Step"
                widget: "list"
                fields:
                  - { name: "token", label: "Token",        widget: "string" }
                  - { name: "value", label: "Value (px)",   widget: "number" }
          - name: "grid"
            label: "Grid system"
            widget: "object"
            fields:
              - { name: "title", label: "Sub-title",   widget: "string" }
              - { name: "desc",  label: "Description (HTML allowed)", widget: "text" }
              - name: "breakpoints"
                label: "Breakpoints"
                label_singular: "Breakpoint"
                widget: "list"
                fields:
                  - { name: "label", label: "Label",          widget: "string" }
                  - { name: "cols",  label: "Columns",        widget: "number" }
                  - { name: "meta",  label: "Meta line",      widget: "string" }
