          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede paragraph", widget: "text" }

      # ---------- 10 Logo lockup (header only) ----------
      - file: "content/logo-lockup.en.json"
