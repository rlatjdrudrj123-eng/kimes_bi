# Sveltia CMS 설정 — Downloads & Assets 단일 컬렉션
# ---------------------------------------------------------------------------
# 이 어드민은 현재 1개 영역만 관리합니다: 자산 다운로드 URL과 status 토글.
#
# legacy content/*.json (intro / color / typography / logo / typography-in-use
# / logo-rules / logo-lockup / asset-library) 등 17개 파일은 어떤 활성 라우트
# 에서도 읽히지 않는 상태이므로 admin 컬렉션에서 제외. 해당 콘텐츠를 살리
# 려면 ContentLoader 매핑 + 컴포넌트 리팩터 필요 (별도 작업).
#
# §9~§15 새 페이지(FAQ / Applications / Permissions / Special Zones / Notation
# / Downloads / Contact)의 const 데이터도 마찬가지로 컴포넌트 코드에 박혀
# 있어 admin에서 직접 편집 불가. 자산 status 토글 + 다운로드 URL 채우기는
# downloads.json 한 파일로 사이트 전체 다운로드 버튼 동작에 즉시 반영.
#
# 인증: GitHub OAuth (Netlify 자동 OAuth 프록시 — 별도 OAuth App 등록 불필요).
# 저장소에 push 권한 있는 GitHub 계정으로 로그인하면 main 브랜치에 직접 커밋.

backend:
  name: github
  repo: rlatjdrudrj123-eng/kimes_bi
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# 로컬 개발 — localhost로 사이트 띄우면 "Work with Local Repository" 옵션이
# 나타나 File System Access API로 직접 파일 편집.
local_backend: true

site_url: "/"
display_url: "/"
logo_url: "/index.html"

collections:
  - name: "downloads_assets"
    label: "Downloads & Assets"
    description: "자산 다운로드 URL과 자산 상태 토글. status를 'ready'로 변경하면 사이트 전체 다운로드 버튼이 일괄 활성화됩니다. 각 항목의 url에 Google Drive 등 링크를 채우면 그 항목만 활성화됩니다. 저장 시 GitHub main 브랜치에 자동 커밋되고 Netlify가 30초 안에 재배포합니다."
    files:
      - file: "content/downloads.json"
        name: "downloads"
        label: "Downloads & Assets"
        format: "json"
        fields:
          - name: "status"
            label: "자산 상태"
            hint: "pending = 모든 다운로드 버튼 비활성 (Coming Soon 표시) / ready = 활성화"
            widget: "select"
            options:
              - { label: "준비 중 (Pending)", value: "pending" }
              - { label: "공개 (Ready)", value: "ready" }

          - name: "bundle"
            label: "통합 패키지"
            hint: "/downloads 페이지 상단의 큰 카드"
            widget: "object"
            fields:
              - { name: "title", label: "패키지 제목", widget: "string" }
              - { name: "desc",  label: "설명",        widget: "string" }
              - { name: "ext",   label: "확장자",      widget: "string", default: ".zip" }
              - { name: "size",  label: "용량",        widget: "string", default: "약 28 MB" }
              - { name: "url",   label: "다운로드 URL", widget: "string", required: false, hint: "비워두면 비활성. Google Drive 또는 직접 호스팅 URL." }

          - name: "categories"
            label: "카테고리별 다운로드"
            label_singular: "카테고리"
            hint: "/downloads 페이지의 카테고리 아코디언"
            widget: "list"
            fields:
              - { name: "id",    label: "ID",       widget: "string" }
              - { name: "label", label: "카테고리 라벨", widget: "string" }
              - name: "items"
                label: "항목"
                label_singular: "자산"
                widget: "list"
                fields:
                  - { name: "name",     label: "이름",  widget: "string" }
                  - { name: "url",      label: "URL",  widget: "string", required: false, hint: "비워두면 비활성. external이 true면 외부 링크 (새 탭)." }
                  - { name: "size",     label: "용량", widget: "string", required: false }
                  - { name: "external", label: "외부 링크?", widget: "boolean", default: false, hint: "Figma·Google Fonts·GitHub 등 외부 사이트 링크인 경우 체크" }

          - name: "applications"
            label: "적용 예시 갤러리 (5종)"
            label_singular: "사례"
            hint: "/applications 페이지의 5개 카드"
            widget: "list"
            fields:
              - { name: "id",        label: "ID",          widget: "string" }
              - { name: "title",     label: "자료 제목",   widget: "string" }
              - { name: "situation", label: "사용 상황",   widget: "string" }
              - { name: "format",    label: "자료 형식",   widget: "string" }
              - { name: "compat",    label: "호환",        widget: "string" }
              - { name: "url",       label: "다운로드 URL", widget: "string", required: false }
