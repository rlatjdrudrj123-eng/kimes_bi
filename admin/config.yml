# Sveltia CMS configuration
# ---------------------------------------------------------------------------
# Backend: github. Editors authenticate with their GitHub account; Sveltia
# commits each save directly to this repo's `main` branch via the GitHub
# REST API. For local development, "Work with Local Repository" reads/writes
# files via the browser's File System Access API — no proxy needed.
#
# Bilingual structure: every section has TWO file entries below — one for
# English (.en.json) and one for Korean (.ko.json). Editors pick whichever
# locale they need. The public site loads both at runtime and toggles via
# the EN / 한국어 button in the sidebar.

backend:
  # Sveltia supports github / gitlab / gitea / bitbucket / test-repo / local.
  # For production, update `repo` below to <github-owner>/<repo>.
  name: github
  repo: rlatjdrudrj123-eng/kimes_bi
  branch: main

# Where the CMS uploads images. Components reference these paths directly.
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Local-development mode. When the site is loaded from localhost, Sveltia
# offers a "Work with Local Repository" option that uses the File System
# Access API to read/write the project folder directly.
local_backend: true

site_url: "/"
display_url: "/"
logo_url: "/index.html"

collections:
  # =========================================================================
  # English copy
  # =========================================================================
  - name: "foundations_en"
    label: "Brand foundations · English"
    description: "English copy for every section on the public site. Pick a section, edit, and Save — Sveltia commits to GitHub and Netlify rebuilds within ~30 seconds."
    files:

      - file: "content/intro.en.json"
        name: "intro_en"
        label: "01 — Intro / Hero"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "meta"
            label: "Meta facts"
            label_singular: "Fact"
            widget: "list"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "value", label: "Value", widget: "string" }

      - file: "content/color.en.json"
        name: "color_en"
        label: "03 — Color tokens"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "groups"
            label: "Brand color groups"
            label_singular: "Group"
            widget: "list"
            fields:
              - { name: "id",        label: "ID",                  widget: "string" }
              - { name: "name",      label: "Brand name",          widget: "string" }
              - { name: "indicator", label: "Indicator dot color", widget: "color" }
              - { name: "note",      label: "Sub-text",            widget: "string" }
              - name: "rows"
                label: "Color rows"
                label_singular: "Color"
                widget: "list"
                fields:
                  - { name: "token", label: "Token (CSS var)", widget: "string" }
                  - { name: "hex",   label: "HEX",             widget: "color" }
                  - { name: "rgb",   label: "RGB",             widget: "string" }
                  - { name: "cmyk",  label: "CMYK",            widget: "string" }
                  - { name: "usage", label: "Usage notes",     widget: "text" }
          - name: "tableHeaders"
            label: "Table column labels"
            widget: "object"
            fields:
              - { name: "token", label: "Token col",  widget: "string", default: "Token" }
              - { name: "hex",   label: "HEX col",    widget: "string", default: "HEX" }
              - { name: "rgb",   label: "RGB col",    widget: "string", default: "RGB" }
              - { name: "cmyk",  label: "CMYK col",   widget: "string", default: "CMYK" }
              - { name: "usage", label: "Usage col",  widget: "string", default: "Usage" }

      - file: "content/typography.en.json"
        name: "typography_en"
        label: "06 — Typography"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "tabs"
            label: "Tab labels"
            widget: "object"
            fields:
              - { name: "latin", label: "Latin tab",  widget: "string" }
              - { name: "kr",    label: "Korean tab", widget: "string" }
          - name: "scaleLatin"
            label: "Latin (Montserrat) scale"
            label_singular: "Step"
            widget: "list"
            fields:
              - { name: "token",  label: "Token",        widget: "string" }
              - { name: "size",   label: "Size (px)",    widget: "number" }
              - { name: "weight", label: "Weight",       widget: "number" }
              - { name: "lh",     label: "Line height",  widget: "number", value_type: "float" }
              - { name: "label",  label: "Label",        widget: "string" }
              - { name: "sample", label: "Sample text",  widget: "text" }
          - name: "scaleKr"
            label: "Korean (Pretendard) scale"
            label_singular: "Step"
            widget: "list"
            fields:
              - { name: "token",  label: "Token",        widget: "string" }
              - { name: "size",   label: "Size (px)",    widget: "number" }
              - { name: "weight", label: "Weight",       widget: "number" }
              - { name: "lh",     label: "Line height",  widget: "number", value_type: "float" }
              - { name: "label",  label: "Label",        widget: "string" }
              - { name: "sample", label: "Sample text",  widget: "text" }

      - file: "content/logo.en.json"
        name: "logo_en"
        label: "08 — Logo catalog"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "brands"
            label: "Brands"
            label_singular: "Brand"
            widget: "list"
            fields:
              - { name: "id",    label: "ID",              widget: "string" }
              - { name: "name",  label: "Brand name",      widget: "string" }
              - { name: "color", label: "Indicator color", widget: "color" }
              - name: "items"
                label: "Logo files"
                label_singular: "File"
                widget: "list"
                fields:
                  - { name: "svg",   label: "SVG ref (LogoSvgs.js key)", widget: "string" }
                  - { name: "file",  label: "Filename",                  widget: "string" }
                  - { name: "label", label: "Label",                     widget: "string" }
                  - { name: "h",     label: "Display height (px)",       widget: "number" }
                  - { name: "dark",  label: "Dark tile",                 widget: "boolean", required: false, default: false }
          - name: "familySignature"
            label: "Family signature footer"
            widget: "object"
            fields:
              - { name: "title", label: "Title",               widget: "string" }
              - { name: "body",  label: "Body (HTML allowed)", widget: "text" }

      - file: "content/spacing.en.json"
        name: "spacing_en"
        label: "12 — Spacing & grid"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede (HTML allowed)", widget: "text" }
          - name: "scale"
            label: "Spacing scale"
            widget: "object"
            fields:
              - { name: "title", label: "Sub-title", widget: "string" }
              - { name: "desc",  label: "Description (HTML allowed)", widget: "text" }
              - name: "tokens"
                label: "Tokens"
                label_singular: "Step"
                widget: "list"
                fields:
                  - { name: "token", label: "Token",      widget: "string" }
                  - { name: "value", label: "Value (px)", widget: "number" }
          - name: "grid"
            label: "Grid system"
            widget: "object"
            fields:
              - { name: "title", label: "Sub-title", widget: "string" }
              - { name: "desc",  label: "Description (HTML allowed)", widget: "text" }
              - name: "breakpoints"
                label: "Breakpoints"
                label_singular: "Breakpoint"
                widget: "list"
                fields:
                  - { name: "label", label: "Label",     widget: "string" }
                  - { name: "cols",  label: "Columns",   widget: "number" }
                  - { name: "meta",  label: "Meta line", widget: "string" }

      # ---------- 07 Typography in use (header only) ----------
      - file: "content/typography-in-use.en.json"
        name: "typography_in_use_en"
