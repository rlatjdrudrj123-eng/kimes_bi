        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title",   label: "Title",   widget: "string" }
          - { name: "lede",    label: "Lede paragraph", widget: "text" }

      # ---------- 09 Logo rules (header only) ----------
      - file: "content/logo-rules.en.json"
        name: "logo_rules_en"
        label: "09 — Logo rules"
