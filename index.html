<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KIMES 2027 BI 가이드</title>
<meta name="description" content="KIMES 2027 참가업체용 브랜드 가이드. 보도자료, 부스, 초청장, SNS 등 KIMES와 함께하는 모든 자료에서 브랜드를 정확하게 표기하는 방법입니다." />

<!-- Fonts + base CSS -->
<link rel="stylesheet" href="docs.css" />

<!-- Global app shell (§3 IA: header / footer / page shell + §19 tokens) -->
<link rel="stylesheet" href="components/app-shell.css" />

<!-- Per-page stylesheets. Add an entry as each Phase 2 page is built;
     remove the legacy ones in the docs.css cleanup at end of Phase 2. -->
<link rel="stylesheet" href="components/copy-toast.css" />
<link rel="stylesheet" href="components/landing.css" />
<link rel="stylesheet" href="components/overview.css" />
<link rel="stylesheet" href="components/logo.css" />
<link rel="stylesheet" href="components/color.css" />
<link rel="stylesheet" href="components/typography.css" />
<link rel="stylesheet" href="components/notation.css" />
<link rel="stylesheet" href="components/special-zones.css" />
<link rel="stylesheet" href="components/permissions.css" />
<link rel="stylesheet" href="components/faq.css" />
<link rel="stylesheet" href="components/downloads.css" />
<link rel="stylesheet" href="components/contact.css" />

<!-- Legacy section stylesheets (still loaded; surviving Foundations
     components reference them. Phase 2 reattaches each component to its
     destination route, then we'll prune.) -->
<link rel="stylesheet" href="components/logo-on-backgrounds.css" />
<link rel="stylesheet" href="components/logo-lockup.css" />
<link rel="stylesheet" href="components/typography-in-use.css" />


<!-- Editor overlay CSS (lightweight in-place editor; trigger: 5x click on
     the KIMES wordmark in the header — class .brand-mark — or visit
     /#admin). Sveltia CMS at /admin/ is the canonical editor — this
     localStorage one is for quick visual tweaks (font, size, line breaks,
     image dimensions) without a commit. -->
<link rel="stylesheet" href="content-editor.css" />

<!-- React + Babel from CDN. The prototype was built against these exact versions. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Event metadata SSoT — must load before any component reads
     window.KIMES_EVENT (Footer, LandingPage, etc.). -->
<script src="components/config.js"></script>

<!-- Content loader — fetches all content/*.json files in parallel and
     exposes the merged result on window.CONTENT. The final mount script
     awaits window.CONTENT_READY before rendering, so components can read
     window.CONTENT.<section-id> at first render time. -->
<script src="content/_loader.js"></script>

<style>
/* Minimal pre-mount loading state so the page isn't blank before React
   takes over. Hidden as soon as React renders into #root. */
#__pre_mount {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #fff; z-index: 999;
  font: 13px/1.4 'Montserrat', system-ui, sans-serif;
  color: #71717a;
}
#__pre_mount .lp { animation: lp 1.4s ease-in-out infinite; }
@keyframes lp { 0%,100% { opacity: .4 } 50% { opacity: 1 } }
#root:not(:empty) ~ #__pre_mount { display: none; }
</style>
</head>
<body>

<!-- React mount point -->
<div id="root"></div>

<!-- Pre-mount loading indicator (hidden once #root has children) -->
<div id="__pre_mount"><div class="lp">KIMES 2027 BI 가이드를 불러오는 중…</div></div>

<!-- Load order:
     1. LogoSvgs.js → window.LOGO_SVGS
     2. Wordmarks.jsx → KimesWordmark, InlineLogo, etc. (reads LOGO_SVGS)
     3. DocsSections.jsx → exports surviving Foundations components
        (Hero, ColorTokens, Typography, LogoCatalog, CoEventPage, hooks)
     4. Per-section components (TypographyInUse, LogoOnBackgrounds,
        LogoLockup, AssetLibrary) — registered on window for Phase 2 use
     5. Router.jsx → useHashRoute + ROUTES + matchRoute + Link
     6. AppShell.jsx → Header + Footer + PageShell + TocSidebar
     7. Pages.jsx → 18 placeholder pages (incl. NotFound) on window
     8. Inline App mount below -->
<script src="components/LogoSvgs.js"></script>
<script type="text/babel" src="components/Wordmarks.jsx"></script>
<script type="text/babel" src="components/DocsSections.jsx"></script>
<script type="text/babel" src="components/TypographyInUse.jsx"></script>
<script type="text/babel" src="components/LogoOnBackgrounds.jsx"></script>
<script type="text/babel" src="components/LogoLockup.jsx"></script>
<script type="text/babel" src="components/AssetLibrary.jsx"></script>
<script type="text/babel" src="components/Router.jsx"></script>
<script type="text/babel" src="components/CopyButton.jsx"></script>
<script type="text/babel" src="components/AppShell.jsx"></script>
<script type="text/babel" src="components/Pages.jsx"></script>
<!-- Per-page implementations — load after Pages.jsx (the stub registry).
     As each phase-2 page lands, its file appears here; the matching stub
     is removed from Pages.jsx so there is exactly one definition. -->
<script type="text/babel" src="components/LandingPage.jsx"></script>
<script type="text/babel" src="components/OverviewPage.jsx"></script>
<script type="text/babel" src="components/LogoPage.jsx"></script>
<script type="text/babel" src="components/ColorPage.jsx"></script>
<script type="text/babel" src="components/TypographyPage.jsx"></script>
<script type="text/babel" src="components/NotationPage.jsx"></script>
<script type="text/babel" src="components/SpecialZonesPage.jsx"></script>
<script type="text/babel" src="components/PermissionsPage.jsx"></script>
<script type="text/babel" src="components/FaqPage.jsx"></script>
<script type="text/babel" src="components/DownloadsPage.jsx"></script>
<script type="text/babel" src="components/ContactPage.jsx"></script>

<script type="text/babel">
function App() {
  const path = window.useHashRoute();
  const route = window.matchRoute(path);
  const Page = route ? window[route.page] : window.NotFoundPage;
  return (
    <div className="app-shell">
      <window.Header />
      <main className="shell-main">
        {/* key={path} forces a clean remount on navigation so per-page
            effects (TocSidebar's H2 scan) re-run reliably. */}
        <Page key={path} />
      </main>
      <window.Footer />
      {/* Global toast outlet — CopyButton과 dispatchToast()가 띄움. */}
      <window.ToastHost />
    </div>
  );
}
// Defer the mount until content/*.json files have loaded — surviving
// Foundations components read from window.CONTENT at render time, so we
// want the data on hand before any page tries to render them.
window.CONTENT_READY.then(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
});
</script>

<!-- Lightweight in-place editor (localStorage-backed). Triggered by 5x
     click on the KIMES wordmark in the header (.brand-mark) or visiting
     /#admin. Sveltia at /admin/ remains the canonical editor for commits. -->
<script src="content-editor.js"></script>

</body>
</html>
